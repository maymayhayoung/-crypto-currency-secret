<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem-Pro 자동 손익비 계산기</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .calculator-container { background-color: #1e1e1e; padding: 30px; border-radius: 12px; width: 380px; box-shadow: 0 8px 24px rgba(0,0,0,0.8); border: 1px solid #333; }
    h2 { text-align: center; color: #f3ba2f; margin-top: 0; margin-bottom: 15px; font-size: 22px; }
    p.desc { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 25px; line-height: 1.4; }
    .position-toggle { display: flex; justify-content: space-between; margin-bottom: 20px; background-color: #2a2a2a; border-radius: 6px; overflow: hidden; }
    .position-toggle label { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; color: #888; }
    .position-toggle input { display: none; }
    .position-toggle input:checked + span { color: #fff; }
    #radio-short:checked + span { background-color: #f6465d; display: block; height: 100%; }
    #radio-long:checked + span { background-color: #0ecb81; display: block; height: 100%; }
    .input-group { margin-bottom: 15px; }
    label.title { display: block; margin-bottom: 5px; font-size: 13px; color: #aaaaaa; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 6px; background-color: #2a2a2a; color: #fff; box-sizing: border-box; font-size: 16px; }
    input[type="number"]:focus { outline: none; border-color: #f3ba2f; }
    button { width: 100%; padding: 14px; background-color: #f3ba2f; color: #121212; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background-color 0.3s; }
    button:hover { background-color: #d19f23; }
    .results { margin-top: 25px; display: none; }
    .result-block { background-color: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #f3ba2f; }
    .result-block.tp1 { border-left-color: #0ecb81; }
    .result-block.tp2 { border-left-color: #0b9e65; }
    .result-block.tp3 { border-left-color: #077248; }
    .block-title { font-size: 14px; font-weight: bold; color: #f3ba2f; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
    .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
    .label-sl { color: #f6465d; }
    .label-tp { color: #0ecb81; font-weight: bold; }
    .val { color: #fff; }
    .error { color: #f6465d; font-size: 13px; text-align: center; margin-top: 15px; display: none; }
</style>
</head>
<body>

<div class="calculator-container">
    <h2>Gem-Pro 자동 계산기</h2>
    <p class="desc">진입 가격만 입력하세요.<br>기본 손절 비율(1%)을 기준으로 자동 계산됩니다.</p>

    <div class="position-toggle">
        <label>
            <input type="radio" name="position" value="short" id="radio-short" checked>
            <span style="padding: 10px; display: block; border-radius: 6px 0 0 6px;">Short (공매도)</span>
        </label>
        <label>
            <input type="radio" name="position" value="long" id="radio-long">
            <span style="padding: 10px; display: block; border-radius: 0 6px 6px 0;">Long (공매수)</span>
        </label>
    </div>

    <div class="input-group">
        <label class="title" for="entry">진입 가격 (Entry Price)</label>
        <input type="number" id="entry" step="any" placeholder="예: 65000">
    </div>

    <div class="input-group">
        <label class="title" for="riskPct">기본 손절 비율 (%) - 수정 가능</label>
        <input type="number" id="riskPct" step="any" value="1.0">
    </div>

    <button onclick="calculateRR()">자동 계산하기</button>

    <div id="error-msg" class="error">진입 가격을 정확히 입력해 주세요.</div>

    <div id="results" class="results">
        <div class="result-block tp1">
            <div class="block-title">비율 1 : 1.5 (보수적 익절)</div>
            <div class="row"><span class="label-sl">손절가 (SL)</span><span class="val" id="sl1">-</span></div>
            <div class="row"><span class="label-tp">익절가 (TP)</span><span class="val" id="tp1">-</span></div>
        </div>
        <div class="result-block tp2">
            <div class="block-title">비율 1 : 2.0 (표준 익절)</div>
            <div class="row"><span class="label-sl">손절가 (SL)</span><span class="val" id="sl2">-</span></div>
            <div class="row"><span class="label-tp">익절가 (TP)</span><span class="val" id="tp2">-</span></div>
        </div>
        <div class="result-block tp3">
            <div class="block-title">비율 1 : 3.0 (추세장 익절)</div>
            <div class="row"><span class="label-sl">손절가 (SL)</span><span class="val" id="sl3">-</span></div>
            <div class="row"><span class="label-tp">익절가 (TP)</span><span class="val" id="tp3">-</span></div>
        </div>
    </div>
</div>

<script>
    function calculateRR() {
        const position = document.querySelector('input[name="position"]:checked').value;
        const entry = parseFloat(document.getElementById('entry').value);
        const riskPct = parseFloat(document.getElementById('riskPct').value);
        const errorMsg = document.getElementById('error-msg');
        const resultsDiv = document.getElementById('results');

        errorMsg.style.display = 'none';
        resultsDiv.style.display = 'none';

        if (isNaN(entry) || entry <= 0 || isNaN(riskPct) || riskPct <= 0) {
            errorMsg.style.display = 'block';
            return;
        }

        let sl, tp1, tp2, tp3;

        if (position === 'short') {
            sl = entry * (1 + riskPct / 100);
            const riskAmt = sl - entry;
            tp1 = entry - (riskAmt * 1.5);
            tp2 = entry - (riskAmt * 2.0);
            tp3 = entry - (riskAmt * 3.0);
        } else {
            sl = entry * (1 - riskPct / 100);
            const riskAmt = entry - sl;
            tp1 = entry + (riskAmt * 1.5);
            tp2 = entry + (riskAmt * 2.0);
            tp3 = entry + (riskAmt * 3.0);
        }

        tp1 = Math.max(tp1, 0);
        tp2 = Math.max(tp2, 0);
        tp3 = Math.max(tp3, 0);

        const getDecimals = (val) => {
            if (Math.floor(val) === val) return 0;
            return val.toString().split(".")[1].length || 0; 
        }
        
        const maxDecimals = Math.max(getDecimals(entry), 2);

        document.getElementById('sl1').innerText = sl.toFixed(maxDecimals);
        document.getElementById('tp1').innerText = tp1.toFixed(maxDecimals);
        
        document.getElementById('sl2').innerText = sl.toFixed(maxDecimals);
        document.getElementById('tp2').innerText = tp2.toFixed(maxDecimals);
        
        document.getElementById('sl3').innerText = sl.toFixed(maxDecimals);
        document.getElementById('tp3').innerText = tp3.toFixed(maxDecimals);

        resultsDiv.style.display = 'block';
    }
</script>

</body>
</html>
